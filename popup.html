<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>PrairieLearn Extension</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 230px;
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #ffffff;
        color: #1a1a1a;
      }

      .header {
        margin-bottom: 14px;
        text-align: center;
      }

      .header h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .header p {
        margin: 2px 0 0;
        font-size: 11px;
        color: #8a8a8a;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      button {
        width: 100%;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        color: #1a1a1a;
        background: #f4f4f5;
        border: 1px solid #e4e4e7;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.05s ease;
      }

      button:hover {
        background: #ebebee;
      }

      button:active {
        transform: scale(0.98);
      }

      #toggleBtn {
        color: #ffffff;
        background: #3b82f6;
        border-color: #3b82f6;
      }

      #toggleBtn:hover {
        background: #2563eb;
      }

      #disableBtn {
        color: #ffffff;
        background: #ef4444;
        border-color: #ef4444;
      }

      #disableBtn:hover {
        background: #dc2626;
      }

      #devModeBtn {
        color: #52525b;
        background: #f4f4f5;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      #devModeBtn svg {
        flex-shrink: 0;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #1e1e1f;
          color: #f4f4f5;
        }

        .header p {
          color: #9a9a9d;
        }

        button {
          color: #f4f4f5;
          background: #2c2c2e;
          border-color: #3a3a3c;
        }

        button:hover {
          background: #353537;
        }

        #devModeBtn {
          color: #d4d4d8;
          background: #2c2c2e;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>PrairieLearn</h1>
      <p>Extension settings</p>
    </div>
    <div class="actions">
      <button id="toggleBtn">Toggle Dark Mode</button>
      <button id="disableBtn">Disable Extension</button>
      <button id="devModeBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
        </svg>
        <span id="devModeLabel">Dev Mode: OFF</span>
      </button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
