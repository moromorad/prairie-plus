<!DOCTYPE html>
<html>
  <head>
    <title>PrairieLearn Extension</title>
    <style>
      body {
        width: 200px;
        padding: 10px;
        font-family: sans-serif;
        text-align: center;
      }
      button {
        padding: 8px 16px;
        cursor: pointer;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 14px;
      }
      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <h3>PL Extension</h3>
    <button id="toggleBtn">Toggle Dark Mode</button>
    <br><br>
    <button id="disableBtn" style="background-color: #dc3545;">Disable Extension</button>
    <script src="popup.js"></script>
  </body>
</html>
